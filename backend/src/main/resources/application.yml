spring:
  application:
    name: librarian-agent
  ai:
    openai:
      base-url: ${LLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}
      api-key: ${LLM_API_KEY:your-api-key-here}
      chat:
        options:
          model: ${LLM_MODEL:glm-4.6v}
          temperature: ${LLM_TEMPERATURE:0.7}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      type: chroma
      chroma:
        collection-name: ${CHROMA_COLLECTION:librarian-docs}
        initialize-schema: true
        client:
          host: ${CHROMA_HOST:localhost}
          port: ${CHROMA_PORT:8000}

rag:
  chunk-size: 512
  chunk-overlap: 128
  top-k: 5
  similarity-threshold: 0.7
  max-history-rounds: 10
  session-timeout-minutes: 30

server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight([%-5level]) [%yellow(%X{traceId})] [%thread] %cyan([%logger{50}]) - %msg%n"
  level:
    com.librarian: DEBUG
    org.springframework.ai: INFO
