# =====================
# 模型提供商配置
# =====================
# 可选值: ZHIPUAI (智谱GLM) | QWEN (通义千问)
ai:
  model:
    provider: ${AI_MODEL_PROVIDER:MINIMAX}

spring:
  ai:
    openai:
      base-url: ${AI_OPENAI_BASE_URL:https://api.minimax.chat}
      api-key: ${AI_API_KEY:your-api-key-here}
      chat:
        options:
          model: ${LLM_MODEL:MiniMax-M2.7}
          temperature: ${LLM_TEMPERATURE:0.7}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:embedding-3}
          dimensions: 1536
    vectorstore:
      chroma:
        collection-name: ${CHROMA_COLLECTION:librarian-docs}
        initialize-schema: true
        tenant-name: ${CHROMA_TENANT:SpringAiTenant}
        database-name: ${CHROMA_DATABASE:SpringAiDatabase}
        client:
          host: ${CHROMA_HOST:http://localhost}
          port: ${CHROMA_PORT:8000}

rag:
  chunk-size: 512
  chunk-overlap: 128
  top-k: 5
  similarity-threshold: 0.7
  max-history-rounds: 10
  session-timeout-minutes: 30

server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight([%-5level]) [%yellow(%X{traceId})] [%thread] %cyan([%logger{50}]) - %msg%n"
  level:
    com.librarian: DEBUG
    org.springframework.ai: INFO
